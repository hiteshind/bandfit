<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BandFit</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
      background:linear-gradient(180deg,#0f172a,#1e293b);
      color:#fff;
    }

    .app{
      max-width:420px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:#0b1220;
    }

    .header{
      padding:20px;
    }

    .title{
      font-size:26px;
      font-weight:700;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

    .content{
      flex:1;
      padding:15px;
      overflow-y:auto;
    }

    .card{
      background:#111827;
      border-radius:20px;
      padding:15px;
      margin-bottom:15px;
    }

    .day{font-size:18px;font-weight:700;}
    .focus{font-size:12px;color:#94a3b8;margin-bottom:10px;}

    .exercise{
      background:#0f172a;
      padding:10px;
      border-radius:12px;
      margin-bottom:8px;
      font-size:13px;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:14px;
      background:#3b82f6;
      color:white;
      font-weight:600;
      margin-top:10px;
    }

    .done{background:#22c55e;}

    .mini{
      font-size:11px;
      color:#94a3b8;
      margin-top:5px;
    }

    .nav{
      display:flex;
      justify-content:space-around;
      padding:12px;
      background:#0f172a;
      border-top:1px solid #1f2937;
      font-size:12px;
      color:#94a3b8;
    }

    .timer{
      position:fixed;
      bottom:80px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      padding:15px;
      border-radius:16px;
      display:none;
      text-align:center;
    }

    .timer button{
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:10px;
      background:#ef4444;
      color:white;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="title">BandFit</div>
    <div class="stats">
      <div>🔥 Streak: <span id="streak">0</span> days</div>
      <div>🔥 Calories: <span id="calories">0</span></div>
    </div>
  </div>

  <div class="content" id="app"></div>

  <div class="nav">
    <div>Home</div>
    <div>Plan</div>
    <div>Progress</div>
  </div>

</div>

<div class="timer" id="timerBox">
  <div>Rest Timer</div>
  <div id="time">60</div>
  <button onclick="stopTimer()">Stop</button>
</div>

<script>
const workoutPlan=[
 {day:"Monday",focus:"Upper Body",cal:250,ex:["Band Chest Press","Push-ups","Plank"]},
 {day:"Tuesday",focus:"Lower Body",cal:300,ex:["Band Squats","Lunges","Glute Bridge"]},
 {day:"Wednesday",focus:"Recovery",cal:120,ex:["Walking","Stretching"]},
 {day:"Thursday",focus:"Back & Arms",cal:260,ex:["Band Rows","Bicep Curls"]},
 {day:"Friday",focus:"Full Body",cal:320,ex:["Squat to Press","Push-ups"]},
 {day:"Saturday",focus:"Conditioning",cal:280,ex:["Walk / Jog","Circuit"]},
 {day:"Sunday",focus:"Rest",cal:100,ex:["Rest"]}
];

const app=document.getElementById("app");
let streak=localStorage.getItem("streak")||0;
let calories=localStorage.getItem("calories")||0;

function updateStats(){
 document.getElementById("streak").innerText=streak;
 document.getElementById("calories").innerText=calories;
}

function saveProgress(cal){
 let today=new Date().toDateString();
 let last=localStorage.getItem("lastDone");

 if(last!==today){
   streak++;
   calories+=cal;
   localStorage.setItem("streak",streak);
   localStorage.setItem("calories",calories);
   localStorage.setItem("lastDone",today);
 }
 updateStats();
}

workoutPlan.forEach(d=>{
 const card=document.createElement("div");
 card.className="card";

 let html=`<div class='day'>${d.day}</div>
 <div class='focus'>${d.focus}</div>`;

 d.ex.forEach(e=>html+=`<div class='exercise'>${e}</div>`);

 html+=`<div class='mini'>🔥 Est. ${d.cal} kcal</div>`;
 html+=`<button class='btn'>Mark Complete</button>`;
 html+=`<button class='btn' style='background:#6b7280;margin-top:8px;' onclick='startTimer()'>Rest Timer</button>`;

 card.innerHTML=html;

 const btn=card.querySelector(".btn");
 btn.onclick=()=>{
   btn.classList.toggle("done");
   btn.innerText=btn.classList.contains("done")?"Completed":"Mark Complete";
   saveProgress(d.cal);
 };

 app.appendChild(card);
});

updateStats();

let t;
function startTimer(){
 let box=document.getElementById("timerBox");
 let time=document.getElementById("time");
 let sec=60;
 box.style.display="block";

 t=setInterval(()=>{
   sec--;
   time.innerText=sec;
   if(sec<=0){stopTimer();}
 },1000);
}

function stopTimer(){
 clearInterval(t);
 document.getElementById("timerBox").style.display="none";
}
</script>

</body>
</html>
