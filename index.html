<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandFit Pro Max</title>

  <meta name="theme-color" content="#0b1220" />

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
      background:#0b1220;
      color:#fff;
    }

    .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

    .header{padding:16px;}
    .title{font-size:22px;font-weight:700;}
    .stats{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-top:6px;}

    .content{flex:1;overflow:auto;padding:12px;}

    .card{background:#111827;border-radius:18px;padding:14px;margin-bottom:12px;}

    .day{font-size:18px;font-weight:700;}
    .focus{font-size:12px;color:#94a3b8;margin-bottom:8px;}

    .exercise{background:#0f172a;padding:8px;border-radius:10px;margin-bottom:6px;font-size:13px;}

    button{width:100%;padding:10px;border-radius:12px;border:none;margin-top:8px;font-weight:600;}

    .complete{background:#3b82f6;color:#fff;}
    .done{background:#22c55e;}

    .panel{background:#111827;padding:10px;border-radius:12px;margin-bottom:10px;}

    input[type=range]{width:100%;}

    canvas{background:#0f172a;border-radius:12px;margin-top:10px;width:100%;}

    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
    .daybox{background:#111827;padding:6px;border-radius:6px;text-align:center;font-size:10px;}
    .heat{background:#22c55e;color:#000;}
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="title">BandFit Pro Max</div>
    <div class="stats">
      <div>🔥 Streak: <span id="streak">0</span></div>
      <div>🔥 Cal: <span id="cal">0</span></div>
    </div>
  </div>

  <div class="content">

    <div class="panel">
      🎯 Fatigue
      <input id="fatigue" type="range" min="1" max="10" value="5" />
      <button class="complete" onclick="generateAI()">Generate AI Workout</button>
    </div>

    <div class="grid" id="calendar"></div>

    <canvas id="chart" height="120"></canvas>

    <div id="app"></div>

  </div>
</div>

<script>
let streak=+localStorage.getItem('streak')||0;
let cal=+localStorage.getItem('cal')||0;
let history=JSON.parse(localStorage.getItem('history')||'[]');

function save(){
  localStorage.setItem('streak',streak);
  localStorage.setItem('cal',cal);
  localStorage.setItem('history',JSON.stringify(history));
}

const streakEl=document.getElementById('streak');
const calEl=document.getElementById('cal');
streakEl.innerText=streak;
calEl.innerText=cal;

const days=['S','M','T','W','T','F','S'];
const calBox=document.getElementById('calendar');

function buildCal(){
  calBox.innerHTML='';
  let d=new Date().getDay();
  days.forEach((x,i)=>{
    let el=document.createElement('div');
    el.className='daybox'+(i<=d?' heat':'');
    el.innerText=x;
    calBox.appendChild(el);
  });
}
buildCal();

let workouts=[];

function generateAI(){
  let f=+document.getElementById('fatigue').value;
  let plan=f>=8?['Walk','Stretch']:(f>=5?['Band Press','Push-ups','Squats']:['Burpees','Lunges','Plank']);
  workouts=[{day:'Today',focus:'AI Plan',cal:200,ex:plan}];
  render();
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  workouts.forEach(w=>{
    let c=document.createElement('div');
    c.className='card';

    let html=`<div class='day'>${w.day}</div><div class='focus'>${w.focus}</div>`;
    w.ex.forEach(e=>html+=`<div class='exercise'>${e}</div>`);
    html+=`<button class='complete'>Complete</button>`;

    c.innerHTML=html;

    let btn=c.querySelector('button');
    btn.onclick=()=>{
      btn.classList.add('done');
      btn.innerText='Done';

      streak++;
      cal+=w.cal;
      history.push({t:Date.now(),cal:w.cal});

      save();
      streakEl.innerText=streak;
      calEl.innerText=cal;
      draw();
    };

    app.appendChild(c);
  });
}

function draw(){
  let ctx=document.getElementById('chart').getContext('2d');
  ctx.clearRect(0,0,400,120);

  history.slice(-5).forEach((h,i)=>{
    ctx.fillStyle='#22c55e';
    ctx.fillRect(30+i*70,100,(h.cal%100),-(h.cal%80));
  });
}

draw();
</script>

</body>
</html>
