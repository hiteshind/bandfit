<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandFit - Resistance Band Workouts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading { font-family: system-ui, -apple-system, sans-serif; }
        
        .exercise-card {
            transition: all 0.3s ease;
        }
        .exercise-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-2xl">💪</div>
                <h1 class="heading text-3xl font-bold">BandFit</h1>
            </div>

            <nav class="space-y-2">
                <a href="#" onclick="showSection('home')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800" id="nav-home">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="#" onclick="showSection('exercises')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800" id="nav-exercises">
                    <i class="fa-solid fa-dumbbell"></i> Exercises
                </a>
                <a href="#" onclick="showSection('routines')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800" id="nav-routines">
                    <i class="fa-solid fa-list-check"></i> Routines
                </a>
                <a href="#" onclick="showSection('tracker')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800" id="nav-tracker">
                    <i class="fa-solid fa-chart-line"></i> Tracker
                </a>
            </nav>

            <div class="mt-auto text-xs text-zinc-500">
                Tube Resistance Band Training
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <div class="p-8">
                <h1 class="text-4xl font-bold heading mb-8" id="page-title">Welcome to BandFit</h1>

                <!-- Home Section -->
                <div id="section-home">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div onclick="startRoutine(0)" class="bg-gradient-to-br from-green-500 to-emerald-600 text-black p-8 rounded-3xl cursor-pointer">
                            <h3 class="text-2xl font-bold">Full Body Blast</h3>
                            <p class="mt-2">25 Minutes • Beginner</p>
                        </div>
                    </div>
                </div>

                <!-- Exercises Section -->
                <div id="section-exercises" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="exercises-grid">
                        <!-- Filled by JavaScript -->
                    </div>
                </div>

                <!-- Add other sections as needed -->
            </div>
        </div>
    </div>

    <script>
        // Sample Exercises
        const exercises = [
            { name: "Banded Squats", muscle: "Legs & Glutes", reps: "12-15", emoji: "🦵" },
            { name: "Standing Rows", muscle: "Back", reps: "12-15", emoji: "🏋️" },
            { name: "Overhead Press", muscle: "Shoulders", reps: "10-12", emoji: "🦾" },
            { name: "Bicep Curls", muscle: "Biceps", reps: "15", emoji: "💪" },
            { name: "Glute Bridges", muscle: "Glutes", reps: "15", emoji: "🍑" }
        ];

        function showSection(section) {
            document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`section-${section}`).classList.remove('hidden');
            
            // Highlight active nav
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('bg-zinc-800'));
        }

        function renderExercises() {
            const container = document.getElementById('exercises-grid');
            container.innerHTML = '';
            
            exercises.forEach(ex => {
                const card = document.createElement('div');
                card.className = "exercise-card bg-zinc-900 rounded-3xl p-6 cursor-pointer";
                card.innerHTML = `
                    <div class="text-6xl mb-4">${ex.emoji}</div>
                    <h3 class="font-semibold text-xl">${ex.name}</h3>
                    <p class="text-green-400 text-sm">${ex.muscle}</p>
                    <p class="text-zinc-400 text-sm mt-2">${ex.reps} reps × 3 sets</p>
                `;
                container.appendChild(card);
            });
        }

        function startRoutine(n) {
            alert("Workout started! 💪\n\nThis is a demo version.");
        }

        // Initialize
        window.onload = function() {
            renderExercises();
            showSection('home');
            console.log("%cBandFit loaded successfully!", "color: lime; font-size: 14px");
        };
    </script>
</body>
</html>
