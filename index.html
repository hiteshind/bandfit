<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandFit Workout Planner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #222;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #666;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .day {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .focus {
      color: #555;
      margin-bottom: 15px;
    }

    ul {
      list-style: none;
    }

    li {
      padding: 10px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 15px;
      background: #111827;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn.completed {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BandFit Workout Planner</h1>
    <p class="subtitle">
      Tube Resistance Bands + Bodyweight Routine<br>
      Age 41 • Intermediate Fitness • General Fitness Goal
    </p>

    <div id="workout-container"></div>
  </div>

  <script>
    const workoutPlan = [
      {
        day: "Monday",
        focus: "Upper Body + Core",
        exercises: [
          "Tube Band Chest Press – 3 x 12",
          "Tube Band Seated Row – 3 x 12",
          "Tube Band Shoulder Press – 3 x 10",
          "Push-ups – 3 x 10",
          "Plank – 3 x 30 sec"
        ]
      },
      {
        day: "Tuesday",
        focus: "Lower Body",
        exercises: [
          "Band Squats – 4 x 12",
          "Reverse Lunges – 3 x 10 each leg",
          "Glute Bridges – 3 x 15",
          "Tube Band Romanian Deadlift – 3 x 12"
        ]
      },
      {
        day: "Wednesday",
        focus: "Mobility + Recovery",
        exercises: [
          "Walking – 30 mins",
          "Stretching – 15 mins",
          "Light Yoga – 15 mins"
        ]
      },
      {
        day: "Thursday",
        focus: "Back + Arms",
        exercises: [
          "Tube Band Lat Pulldown – 3 x 12",
          "Bicep Curl – 3 x 12",
          "Tricep Pushdown – 3 x 12",
          "Band Face Pull – 3 x 15"
        ]
      },
      {
        day: "Friday",
        focus: "Full Body Circuit",
        exercises: [
          "Band Squat to Press – 3 x 12",
          "Push-ups – 3 x 12",
          "Tube Band Rows – 3 x 12",
          "Russian Twists – 3 x 20"
        ]
      },
      {
        day: "Saturday",
        focus: "Conditioning",
        exercises: [
          "Brisk Walk / Jog – 30 mins",
          "Bodyweight Circuit – 20 mins"
        ]
      },
      {
        day: "Sunday",
        focus: "Rest Day",
        exercises: [
          "Complete Rest",
          "Optional Light Walk",
          "Hydration + Recovery"
        ]
      }
    ];

    const container = document.getElementById("workout-container");

    workoutPlan.forEach((item) => {
      const card = document.createElement("div");
      card.className = "card";

      const exercisesHTML = item.exercises
        .map(ex => `<li>${ex}</li>`)
        .join("");

      card.innerHTML = `
        <div class="day">${item.day}</div>
        <div class="focus">${item.focus}</div>
        <ul>${exercisesHTML}</ul>
        <button class="btn">Mark Complete</button>
      `;

      const button = card.querySelector(".btn");
      button.addEventListener("click", () => {
        button.classList.toggle("completed");
        button.textContent = button.classList.contains("completed")
          ? "Completed"
          : "Mark Complete";
      });

      container.appendChild(card);
    });
  </script>
</body>
</html>
