<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandFit – Apple Fitness Style</title>

  <meta name="theme-color" content="#0b1220" />

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
      background:#0b1220;
      color:#fff;
    }

    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .header{
      padding:18px;
    }

    .title{
      font-size:26px;
      font-weight:800;
    }

    .subtitle{
      font-size:12px;
      color:#94a3b8;
      margin-top:4px;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

    .content{
      flex:1;
      overflow:auto;
      padding:12px;
    }

    .card{
      background:linear-gradient(145deg,#111827,#0f172a);
      border-radius:22px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      transition:0.2s;
    }

    .card:active{transform:scale(0.98);}

    .day{font-size:20px;font-weight:800;}
    .focus{font-size:12px;color:#94a3b8;margin-bottom:10px;}

    .exercise{
      background:#0b1220;
      padding:10px;
      border-radius:12px;
      margin-bottom:6px;
      font-size:13px;
    }

    .btn{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:none;
      margin-top:10px;
      font-weight:700;
      background:#3b82f6;
      color:white;
    }

    .done{background:#22c55e;}

    .panel{
      background:#111827;
      padding:12px;
      border-radius:18px;
      margin-bottom:12px;
    }

    input[type=range]{width:100%;accent-color:#3b82f6;}

    .grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:5px;
      margin-bottom:12px;
    }

    .daybox{
      background:#111827;
      padding:8px;
      border-radius:10px;
      text-align:center;
      font-size:10px;
      color:#94a3b8;
    }

    .heat{
      background:#22c55e;
      color:#000;
      font-weight:700;
    }

    canvas{
      background:#0f172a;
      border-radius:16px;
      margin-top:10px;
      width:100%;
    }

    .segment{
      display:flex;
      background:#111827;
      border-radius:14px;
      overflow:hidden;
      margin-bottom:12px;
    }

    .segment div{
      flex:1;
      text-align:center;
      padding:8px;
      font-size:12px;
      color:#94a3b8;
      cursor:pointer;
    }

    .segment .active{
      background:#3b82f6;
      color:white;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="title">BandFit</div>
    <div class="subtitle">Apple Fitness Style Adaptive Training</div>

    <div class="stats">
      <div>🔥 Streak: <span id="streak">0</span></div>
      <div>🔥 Calories: <span id="cal">0</span></div>
    </div>
  </div>

  <div class="content">

    <div class="segment">
      <div class="active">Today</div>
      <div>Week</div>
      <div>AI</div>
    </div>

    <div class="grid" id="calendar"></div>

    <div class="panel">
      🎯 Fatigue Level
      <input id="fatigue" type="range" min="1" max="10" value="5" />
      <button class="btn" onclick="generateAI()">Generate Workout</button>
    </div>

    <div id="app"></div>

    <canvas id="chart" height="120"></canvas>

  </div>
</div>

<script>
let streak=+localStorage.getItem('streak')||0;
let cal=+localStorage.getItem('cal')||0;
let history=JSON.parse(localStorage.getItem('history')||'[]');

function save(){
  localStorage.setItem('streak',streak);
  localStorage.setItem('cal',cal);
  localStorage.setItem('history',JSON.stringify(history));
}

document.getElementById('streak').innerText=streak;
document.getElementById('cal').innerText=cal;

const calBox=document.getElementById('calendar');
const days=['S','M','T','W','T','F','S'];

function buildCal(){
  calBox.innerHTML='';
  let d=new Date().getDay();
  days.forEach((x,i)=>{
    let el=document.createElement('div');
    el.className='daybox'+(i<=d?' heat':'');
    el.innerText=x;
    calBox.appendChild(el);
  });
}
buildCal();

let workouts=[];

function generateAI(){
  let f=+document.getElementById('fatigue').value;

  let plan = f>=8
    ? ['Walk','Stretch','Mobility']
    : f>=5
    ? ['Band Press','Push-ups','Squats']
    : ['Burpees','Lunges','Plank'];

  workouts=[{day:'Today',focus:'Adaptive AI Session',cal:220,ex:plan}];
  render();
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  workouts.forEach(w=>{
    let c=document.createElement('div');
    c.className='card';

    let html=`<div class='day'>${w.day}</div><div class='focus'>${w.focus}</div>`;
    w.ex.forEach(e=>html+=`<div class='exercise'>${e}</div>`);
    html+=`<button class='btn'>Complete</button>`;

    c.innerHTML=html;

    let btn=c.querySelector('button');

    btn.onclick=()=>{
      btn.classList.add('done');
      btn.innerText='Completed';

      streak++;
      cal+=w.cal;

      history.push({t:Date.now(),cal:w.cal});

      save();

      document.getElementById('streak').innerText=streak;
      document.getElementById('cal').innerText=cal;

      draw();
    };

    app.appendChild(c);
  });
}

render();

function draw(){
  const ctx=document.getElementById('chart').getContext('2d');
  ctx.clearRect(0,0,400,120);

  history.slice(-5).forEach((h,i)=>{
    ctx.fillStyle='#22c55e';
    ctx.fillRect(30+i*70,100,(h.cal%120),-(h.cal%80));
  });
}
draw();
</script>

</body>
</html>
