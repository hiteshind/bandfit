<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandFit • 41+ Hybrid Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading { font-family: system-ui, -apple-system, sans-serif; }
        .exercise-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-11 h-11 bg-green-500 rounded-2xl flex items-center justify-center text-3xl">💪</div>
            <h1 class="heading text-3xl font-bold">BandFit</h1>
        </div>
        
        <nav class="space-y-2 flex-1">
            <a href="#" onclick="showSection('weekly')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800" id="nav-weekly">📅 Weekly Plan</a>
            <a href="#" onclick="showSection('exercises')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800" id="nav-exercises">🏋️ All Exercises</a>
            <a href="#" onclick="showSection('tracker')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800" id="nav-tracker">📊 Progress</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto p-8">
        <h1 class="text-4xl font-bold heading mb-8" id="page-title">BandFit • Hybrid Training</h1>

        <!-- Weekly Plan -->
        <div id="section-weekly">
            <h2 class="text-3xl font-bold mb-8">5-Day Hybrid Plan</h2>
            <div id="weekly-plan" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <!-- All Exercises -->
        <div id="section-exercises" class="hidden">
            <h2 class="text-3xl font-bold mb-8">All Exercises (Click for Instructions)</h2>
            <div id="exercises-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Tracker -->
        <div id="section-tracker" class="hidden">
            <h2 class="text-3xl font-bold mb-8">Progress Tracker</h2>
            <button onclick="logWorkout()" class="bg-green-500 text-black px-8 py-4 rounded-2xl font-semibold">Log Today's Workout</button>
            <div id="history-list" class="mt-8 space-y-4"></div>
        </div>
    </div>
</div>

<!-- Exercise Detail Modal -->
<div id="exercise-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 max-w-lg w-full mx-4 rounded-3xl overflow-hidden">
        <div id="modal-image" class="h-64 bg-zinc-800"></div>
        <div class="p-8">
            <h3 id="modal-title" class="text-3xl font-bold mb-2"></h3>
            <p id="modal-muscle" class="text-green-400"></p>
            
            <div class="my-8">
                <h4 class="font-medium text-green-400 mb-3">HOW TO PERFORM</h4>
                <p id="modal-instructions" class="text-zinc-300 leading-relaxed"></p>
            </div>
            
            <button onclick="closeModal()" class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">
                Close
            </button>
        </div>
    </div>
</div>

<script>
// Data with Detailed Instructions
const exercises = [
    {
        name: "Banded Squats",
        muscle: "Quads, Glutes, Hamstrings",
        difficulty: "Intermediate",
        image: "https://picsum.photos/id/1015/600/400",
        instructions: "1. Stand on the center of the resistance band with feet shoulder-width apart.\n2. Hold the handles at shoulder height.\n3. Lower your body by bending knees and hips as if sitting back into a chair.\n4. Keep chest up and knees tracking over toes.\n5. Drive through heels to return to standing."
    },
    {
        name: "Push-Ups",
        muscle: "Chest, Shoulders, Triceps",
        difficulty: "Intermediate",
        image: "https://picsum.photos/id/180/600/400",
        instructions: "1. Start in plank position with hands slightly wider than shoulders.\n2. Lower your body until chest nearly touches the floor.\n3. Keep body straight — don't let hips sag.\n4. Push back up to starting position.\n5. Modify on knees if needed."
    },
    {
        name: "Band Rows",
        muscle: "Back, Rear Shoulders",
        difficulty: "Beginner",
        image: "https://picsum.photos/id/201/600/400",
        instructions: "1. Anchor the band at chest height.\n2. Hold handles with arms extended.\n3. Pull handles toward your torso while squeezing shoulder blades.\n4. Keep elbows close to body.\n5. Slowly return to start."
    }
];

let workoutHistory = JSON.parse(localStorage.getItem('bandfitHistory')) || [];

// Show Section
function showSection(section) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById(`section-${section}`).classList.remove('hidden');
}

// Render Weekly Plan
function renderWeeklyPlan() {
    const container = document.getElementById('weekly-plan');
    container.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="font-bold text-2xl mb-6">Monday - Lower Body</h3>
            <ul class="space-y-4">
                <li onclick="showExerciseDetail(0)" class="cursor-pointer hover:text-green-400">• Banded Squats</li>
                <li onclick="showExerciseDetail(2)" class="cursor-pointer hover:text-green-400">• Band Rows</li>
            </ul>
        </div>
    `;
}

// Render All Exercises
function renderExercises() {
    const container = document.getElementById('exercises-grid');
    container.innerHTML = exercises.map((ex, index) => `
        <div onclick="showExerciseDetail(${index})" class="exercise-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            <img src="${ex.image}" class="w-full h-52 object-cover">
            <div class="p-6">
                <h3 class="font-semibold text-xl">${ex.name}</h3>
                <p class="text-green-400">${ex.muscle}</p>
            </div>
        </div>
    `).join('');
}

// Modal Functions
function showExerciseDetail(index) {
    const ex = exercises[index];
    document.getElementById('modal-title').textContent = ex.name;
    document.getElementById('modal-muscle').textContent = ex.muscle;
    document.getElementById('modal-instructions').textContent = ex.instructions;
    document.getElementById('modal-image').innerHTML = `<img src="${ex.image}" class="w-full h-full object-cover">`;
    document.getElementById('exercise-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('exercise-modal').classList.add('hidden');
}

function logWorkout() {
    const today = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    workoutHistory.push({ date: today, type: "Training Session" });
    localStorage.setItem('bandfitHistory', JSON.stringify(workoutHistory));
    renderHistory();
    alert("✅ Workout logged!");
}

function renderHistory() {
    const container = document.getElementById('history-list');
    container.innerHTML = workoutHistory.length ? workoutHistory.slice().reverse().map(w => `
        <div class="bg-zinc-900 p-5 rounded-2xl">${w.date} — ${w.type}</div>
    `).join('') : `<p class="text-zinc-500">No workouts logged yet.</p>`;
}

// Initialize
window.onload = () => {
    renderWeeklyPlan();
    renderExercises();
    renderHistory();
    showSection('weekly');
};
</script>
</body>
</html>
